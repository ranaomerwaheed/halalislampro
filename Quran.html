<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Holy Quran</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f9f9f9;
  --text:#000;
  --card:#fff;
}
.dark{
  --bg:#121212;
  --text:#fff;
  --card:#1e1e1e;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial, sans-serif;
}

.container{
  display:flex;
  height:100vh;
}

/* Sidebar */
.sidebar{
  width:280px;
  background:#0a3d62;
  color:#fff;
  overflow-y:auto;
}
.sidebar h2{
  margin:0;
  padding:15px;
  text-align:center;
  background:#062f4f;
}
.surah{
  padding:12px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.surah:hover{
  background:#1e5f8a;
}

/* Content */
.content{
  flex:1;
  padding:15px;
  overflow-y:auto;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button{
  padding:6px 10px;
  cursor:pointer;
}
.ayah-box{
  background:var(--card);
  padding:15px;
  margin-bottom:15px;
  border-radius:6px;
}
.ayah{
  font-family:'Amiri', serif;
  font-size:26px;
  direction:rtl;
  text-align:right;
}
.translation{
  font-size:14px;
  margin-top:8px;
  color:gray;
}
audio{
  width:100%;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Surahs</h2>
    <div id="surahList">Loading...</div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="topbar">
      <h2 id="title">Select Surah</h2>
      <button onclick="toggleDark()">🌙</button>
    </div>
    <div id="ayahs"></div>
  </div>

</div>

<script>
const surahList = document.getElementById("surahList");
const ayahsDiv = document.getElementById("ayahs");
const title = document.getElementById("title");

/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* LOAD SURAH LIST */
fetch("https://api.quran.com/api/v4/chapters")
.then(r=>r.json())
.then(d=>{
  surahList.innerHTML="";
  d.chapters.forEach(s=>{
    let div=document.createElement("div");
    div.className="surah";
    div.innerText=`${s.id}. ${s.name_simple}`;
    div.onclick=()=>loadSurah(s.id,s.name_simple);
    surahList.appendChild(div);
  });
});

/* LOAD SURAH DATA */
function loadSurah(id,name){
  title.innerText="Surah "+name;
  ayahsDiv.innerHTML="Loading...";

  Promise.all([
    fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${id}`),
    fetch(`https://api.quran.com/api/v4/quran/translations/131?chapter_number=${id}`),
    fetch(`https://api.quran.com/api/v4/quran/translations/97?chapter_number=${id}`),
    fetch(`https://api.quran.com/api/v4/recitations/7/by_chapter/${id}`)
  ])
  .then(res=>Promise.all(res.map(r=>r.json())))
  .then(([ar,en,ur,audio])=>{
    ayahsDiv.innerHTML="";
    ar.verses.forEach((v,i)=>{
      ayahsDiv.innerHTML+=`
        <div class="ayah-box">
          <div class="ayah">${v.text_uthmani}</div>
          <div class="translation"><b>EN:</b> ${en.translations[i].text}</div>
          <div class="translation"><b>UR:</b> ${ur.translations[i].text}</div>
          <audio controls src="${audio.audio_files[i].url}"></audio>
        </div>
      `;
    });
  });
}
</script>

</body>
</html>
