<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Holy Quran</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Arabic Font -->
<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f9f9f9;
}

.container {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 280px;
  background: #0a3d62;
  color: white;
  overflow-y: auto;
}

.sidebar h2 {
  text-align: center;
  padding: 15px;
  margin: 0;
  background: #07406b;
}

.surah {
  padding: 12px 15px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.surah:hover {
  background: #1e5f8a;
}

/* Content */
.content {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.ayah {
  font-family: 'Amiri', serif;
  font-size: 26px;
  direction: rtl;
  text-align: right;
  margin-bottom: 10px;
}

.translation {
  font-size: 14px;
  color: #555;
  margin-bottom: 20px;
  direction: ltr;
  text-align: left;
}

.header {
  font-size: 22px;
  margin-bottom: 20px;
  border-bottom: 2px solid #ddd;
  padding-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Surahs</h2>
    <div id="surahList">Loading...</div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="header" id="surahTitle">Select a Surah</div>
    <div id="ayahs"></div>
  </div>

</div>

<script>
const surahList = document.getElementById("surahList");
const ayahsDiv = document.getElementById("ayahs");
const surahTitle = document.getElementById("surahTitle");

/* Load Surah List */
fetch("https://api.quran.com/api/v4/chapters")
  .then(res => res.json())
  .then(data => {
    surahList.innerHTML = "";
    data.chapters.forEach(ch => {
      let div = document.createElement("div");
      div.className = "surah";
      div.innerHTML = `${ch.id}. ${ch.name_simple}`;
      div.onclick = () => loadSurah(ch.id, ch.name_simple);
      surahList.appendChild(div);
    });
  });

/* Load Surah Ayahs */
function loadSurah(number, name) {
  surahTitle.innerText = `Surah ${name}`;
  ayahsDiv.innerHTML = "Loading...";

  Promise.all([
    fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${number}`),
    fetch(`https://api.quran.com/api/v4/quran/translations/131?chapter_number=${number}`)
  ])
  .then(responses => Promise.all(responses.map(r => r.json())))
  .then(([arabic, translation]) => {
    ayahsDiv.innerHTML = "";

    arabic.verses.forEach((ayah, i) => {
      ayahsDiv.innerHTML += `
        <div class="ayah">${ayah.text_uthmani}</div>
        <div class="translation">${translation.translations[i].text}</div>
      `;
    });
  });
}
</script>

</body>
</html>
