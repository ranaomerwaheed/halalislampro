<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Holy Quran</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
}
.container{
  display:flex;
  height:100vh;
}
.sidebar{
  width:260px;
  background:#0a3d62;
  color:white;
  overflow-y:auto;
}
.sidebar h2{
  margin:0;
  padding:15px;
  text-align:center;
  background:#062f4f;
}
.surah{
  padding:12px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.surah:hover{
  background:#1e5f8a;
}
.content{
  flex:1;
  padding:20px;
  overflow-y:auto;
}
.ayah-box{
  margin-bottom:25px;
}
.ayah{
  font-family:'Amiri', serif;
  font-size:26px;
  direction:rtl;
  text-align:right;
}
.translation{
  font-size:14px;
  color:#444;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="container">

  <!-- SURAH LIST -->
  <div class="sidebar">
    <h2>Surahs</h2>
    <div id="surahList">Loading...</div>
  </div>

  <!-- QURAN -->
  <div class="content">
    <h2 id="title">Select a Surah</h2>
    <div id="ayahs"></div>
  </div>

</div>

<script>
const surahList = document.getElementById("surahList");
const ayahs = document.getElementById("ayahs");
const title = document.getElementById("title");

/* LOAD SURAH NAMES */
fetch("https://api.quran.com/api/v4/chapters")
.then(res => res.json())
.then(data => {
  surahList.innerHTML="";
  data.chapters.forEach(s => {
    let div = document.createElement("div");
    div.className="surah";
    div.innerText = s.id + ". " + s.name_simple;
    div.onclick = () => loadSurah(s.id, s.name_simple);
    surahList.appendChild(div);
  });
});

/* LOAD SURAH AYAT (WORKING ENDPOINT) */
function loadSurah(id, name){
  title.innerText = "Surah " + name;
  ayahs.innerHTML = "Loading...";

  fetch(`https://api.quran.com/api/v4/verses/by_chapter/${id}?language=en&words=false&translations=131`)
  .then(res => res.json())
  .then(data => {
    ayahs.innerHTML="";
    data.verses.forEach(v => {
      ayahs.innerHTML += `
        <div class="ayah-box">
          <div class="ayah">${v.text_uthmani}</div>
          <div class="translation">${v.translations[0].text}</div>
        </div>
      `;
    });
  });
}
</script>

</body>
</html>
